<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운영 매뉴얼 — Daily Mission</title>
  <link rel="stylesheet" href="admin.css">
  <style>
    .manual-wrap {
      max-width: 900px;
      margin: 28px auto;
      padding: 0 24px 60px;
    }
    .manual-body {
      background: #fff;
      border-radius: 10px;
      padding: 40px 48px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.08);
      line-height: 1.8;
      color: #1e293b;
    }
    .manual-body h1 {
      font-size: 1.6rem;
      font-weight: 700;
      border-bottom: 2px solid #e2e8f0;
      padding-bottom: 14px;
      margin-bottom: 24px;
      color: #0f172a;
    }
    .manual-body h2 {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1e3a5f;
      margin: 36px 0 12px;
      padding: 8px 14px;
      background: #f0f6ff;
      border-left: 4px solid #2563eb;
      border-radius: 0 6px 6px 0;
    }
    .manual-body h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: #334155;
      margin: 24px 0 8px;
    }
    .manual-body p {
      margin: 8px 0;
      font-size: 0.9rem;
      color: #475569;
    }
    .manual-body a { color: #2563eb; text-decoration: none; }
    .manual-body a:hover { text-decoration: underline; }
    .manual-body ul, .manual-body ol {
      margin: 8px 0 8px 20px;
      font-size: 0.9rem;
      color: #475569;
    }
    .manual-body li { margin: 4px 0; }
    .manual-body table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      margin: 12px 0;
    }
    .manual-body th {
      background: #f8fafc;
      padding: 9px 12px;
      text-align: left;
      font-weight: 600;
      border: 1px solid #e2e8f0;
      color: #334155;
    }
    .manual-body td {
      padding: 8px 12px;
      border: 1px solid #e2e8f0;
      color: #475569;
    }
    .manual-body tr:nth-child(even) td { background: #f8fafc; }
    .manual-body pre {
      background: #1e293b;
      color: #e2e8f0;
      border-radius: 8px;
      padding: 16px 20px;
      overflow-x: auto;
      font-size: 0.82rem;
      line-height: 1.6;
      margin: 12px 0;
    }
    .manual-body code {
      background: #f1f5f9;
      color: #0f172a;
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.82rem;
      font-family: 'Consolas', 'D2Coding', monospace;
    }
    .manual-body pre code {
      background: none;
      color: inherit;
      padding: 0;
      font-size: inherit;
    }
    .manual-body blockquote {
      border-left: 4px solid #fbbf24;
      background: #fffbeb;
      margin: 12px 0;
      padding: 10px 16px;
      border-radius: 0 6px 6px 0;
      font-size: 0.88rem;
      color: #92400e;
    }
    .manual-body hr {
      border: none;
      border-top: 1px solid #e2e8f0;
      margin: 28px 0;
    }
    .toc-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 8px;
      font-size: 0.85rem;
    }
    .toc-box a { color: #2563eb; line-height: 2; }
    .loading-txt { text-align: center; color: #94a3b8; padding: 60px 0; }
    .print-btn {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      box-shadow: 0 4px 12px rgba(37,99,235,0.35);
      transition: filter 0.15s;
    }
    .print-btn:hover { filter: brightness(0.9); }
    @media print {
      .site-header, .print-btn { display: none; }
      .manual-body { box-shadow: none; padding: 0; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:16px">
        <a href="/admin/" style="color:#94a3b8;text-decoration:none;font-size:.85rem">← 데이타 관리</a>
        <h1>운영 매뉴얼</h1>
      </div>
      <div class="header-actions">
        <span id="header-user" style="font-size:.85rem;color:#94a3b8"></span>
        <a href="/admin/users.html" class="btn btn-secondary">👥 계정 관리</a>
        <button class="btn btn-secondary" onclick="logout()">로그아웃</button>
      </div>
    </div>
  </header>

  <div class="manual-wrap">
    <div class="manual-body" id="manual-body">
      <p class="loading-txt">매뉴얼 로딩 중...</p>
    </div>
  </div>

  <button class="print-btn" onclick="window.print()">🖨 인쇄</button>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    async function init() {
      // 인증 확인
      const authRes = await fetch('/api/auth/me')
      if (!authRes.ok) { window.location.href = '/admin/login.html'; return }
      const me = await authRes.json()
      document.getElementById('header-user').textContent = `👤 ${me.username}`

      // 매뉴얼 로드
      const res = await fetch('/MANUAL.md')
      const md  = await res.text()
      document.getElementById('manual-body').innerHTML = marked.parse(md)

      // 코드 블록 내 링크 제거 (마크다운 파싱 부작용 방지)
      document.querySelectorAll('pre a').forEach(a => {
        a.replaceWith(a.textContent)
      })
    }

    async function logout() {
      await fetch('/api/auth/logout', { method: 'POST' })
      window.location.href = '/admin/login.html'
    }

    init()
  </script>
</body>
</html>
