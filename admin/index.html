<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Daily Mission</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <h1>데이타 관리</h1>
      <div class="header-actions">
        <span id="header-user" class="header-user"></span>
        <button class="btn btn-secondary" onclick="Admin.exportExcel()">⬇ 엑셀 다운로드</button>
        <label class="btn btn-secondary">
          ⬆ 엑셀 업로드
          <input type="file" id="import-input" accept=".xlsx,.csv" onchange="Admin.importExcel(this)">
        </label>
        <button class="btn btn-primary" onclick="Admin.openAdd()">+ 새 항목</button>
        <a href="/admin/users.html" class="btn btn-secondary">👥 계정 관리</a>
        <a href="/admin/manual.html" class="btn btn-secondary">📋 매뉴얼</a>
        <button class="btn btn-secondary" onclick="Admin.logout()">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="toolbar">
      <input type="text" id="search-dt" placeholder="날짜 검색 (예: 0523)" maxlength="4"
             oninput="Admin.search(this.value)">
      <span id="total-count" class="count-badge"></span>
    </div>

    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th class="col-dt">날짜</th>
            <th class="col-title">제목</th>
            <th class="col-text">한글 본문 1</th>
            <th class="col-text">영어 본문 1</th>
            <th class="col-actions">관리</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5" class="empty-row">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button class="btn btn-sm" id="btn-prev" onclick="Admin.prevPage()">← 이전</button>
      <span id="page-info"></span>
      <button class="btn btn-sm" id="btn-next" onclick="Admin.nextPage()">다음 →</button>
    </div>
  </main>

  <!-- 추가 / 수정 모달 -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">항목 추가</h2>
        <button class="close-btn" onclick="Admin.closeModal()">✕</button>
      </div>
      <form id="entry-form" onsubmit="Admin.submitForm(event)">
        <div class="form-grid">
          <div class="form-group full">
            <label>날짜 (MMDD) <span class="required">*</span></label>
            <input type="text" id="f-dt" placeholder="예: 0523" maxlength="4" pattern="\d{4}" required>
          </div>
          <div class="form-group full">
            <label>제목</label>
            <textarea id="f-title" rows="2" placeholder="날짜·테마 제목"></textarea>
          </div>
          <div class="form-group">
            <label>한글 본문 1</label>
            <textarea id="f-ko1" rows="6" placeholder="한글 묵상 본문"></textarea>
          </div>
          <div class="form-group">
            <label>영어 본문 1</label>
            <textarea id="f-en1" rows="6" placeholder="English devotion text"></textarea>
          </div>
          <div class="form-group">
            <label>한글 본문 2 <span class="hint">(성경 구절)</span></label>
            <textarea id="f-ko2" rows="4" placeholder="한글 성경 구절"></textarea>
          </div>
          <div class="form-group">
            <label>영어 본문 2 <span class="hint">(Scripture)</span></label>
            <textarea id="f-en2" rows="4" placeholder="Scripture passage"></textarea>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Admin.closeModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="admin.js"></script>
</body>
</html>
