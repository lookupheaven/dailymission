<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>운영자 계정 관리 — Daily Mission</title>
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-left">
        <a href="/admin/" class="back-link">← 데이터 관리</a>
        <h1>운영자 계정 관리</h1>
      </div>
      <div class="header-actions">
        <span id="header-user" class="header-user"></span>
        <button class="btn btn-secondary" onclick="Users.openAdd()">+ 계정 추가</button>
        <a href="/admin/manual.html" class="btn btn-secondary">📋 매뉴얼</a>
        <button class="btn btn-secondary" onclick="Users.logout()">로그아웃</button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th style="width:50px">ID</th>
            <th>아이디</th>
            <th style="width:90px">역할</th>
            <th style="width:160px">생성일</th>
            <th style="width:180px">관리</th>
          </tr>
        </thead>
        <tbody id="table-body">
          <tr><td colspan="5" class="empty-row">로딩 중...</td></tr>
        </tbody>
      </table>
    </div>
  </main>

  <!-- 계정 추가/수정 모달 -->
  <div id="modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:460px">
      <div class="modal-header">
        <h2 id="modal-title">계정 추가</h2>
        <button class="close-btn" onclick="Users.closeModal()">✕</button>
      </div>
      <form id="user-form" onsubmit="Users.submitForm(event)">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group full">
            <label>아이디 <span class="required">*</span></label>
            <input type="text" id="f-username" required autocomplete="off">
          </div>
          <div class="form-group full">
            <label>역할</label>
            <select id="f-role">
              <option value="admin">admin</option>
            </select>
          </div>
          <div class="form-group full" id="pw-group">
            <label id="pw-label">패스워드 <span class="required">*</span></label>
            <input type="password" id="f-password" autocomplete="new-password" placeholder="4자 이상">
          </div>
          <div class="form-group full" id="pw-confirm-group">
            <label>패스워드 확인</label>
            <input type="password" id="f-password-confirm" autocomplete="new-password" placeholder="동일하게 입력">
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Users.closeModal()">취소</button>
          <button type="submit" class="btn btn-primary" id="submit-btn">저장</button>
        </div>
      </form>
    </div>
  </div>

  <!-- 패스워드 변경 모달 -->
  <div id="pw-modal" class="modal-overlay hidden">
    <div class="modal-box" style="max-width:400px">
      <div class="modal-header">
        <h2 id="pw-modal-title">패스워드 변경</h2>
        <button class="close-btn" onclick="Users.closePwModal()">✕</button>
      </div>
      <form id="pw-form" onsubmit="Users.submitPwForm(event)">
        <div class="form-grid" style="grid-template-columns:1fr">
          <div class="form-group full">
            <label>새 패스워드 <span class="required">*</span></label>
            <input type="password" id="pw-new" autocomplete="new-password" placeholder="4자 이상" required>
          </div>
          <div class="form-group full">
            <label>패스워드 확인 <span class="required">*</span></label>
            <input type="password" id="pw-confirm" autocomplete="new-password" placeholder="동일하게 입력" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" onclick="Users.closePwModal()">취소</button>
          <button type="submit" class="btn btn-primary">변경</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="users.js"></script>
</body>
</html>
